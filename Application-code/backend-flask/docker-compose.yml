version: '3.8'

services:
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"    # Jaeger UI
      - "4317:4317"      # OTLP gRPC (for Collector → Jaeger)
      - "4318:4318"      # OTLP HTTP (for Collector → Jaeger)
      - "14268:14268"    # Legacy Jaeger HTTP
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4319:4317"      # OTLP gRPC (for App → Collector)
      - "4320:4318"      # OTLP HTTP (for App → Collector)
      - "8889:8889"  # Prometheus scrape endpoint
    command: ["--config", "/etc/otel-collector-config.yaml"]
    depends_on:
      - jaeger
    networks:
      - observability
  prometheus:
      image: prom/prometheus:latest
      container_name: prometheus
      ports:
        - "9090:9090"
      volumes:
        - ./prometheus.yml:/etc/prometheus/prometheus.yml
      networks:
        - observability
      depends_on:
        - otel-collector
# NEW: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"  # Host 3001 → Container 3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana-storage:/var/lib/grafana
      - C:/Users/PC/Documents/Coding_projects/aws-bootcamp-cruddur-2023/Application-code/backend-flask/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - observability
    depends_on:
      - prometheus

networks:
  observability:
    driver: bridge

volumes:
  grafana-storage:

